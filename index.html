<!DOCTYPE html>
<html lang="tr" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>dailyFORmind – Zihnini Düzenle</title>

<!-- Google Fonts & Lucide Icons Fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut, updateProfile, signInWithCustomToken, signInAnonymously
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, collection,
    addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, initializeFirestore
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── Firebase Yapılandırması (Çift Yönlü Uyumlu) ─────────────────────
  const firebaseConfig = typeof __firebase_config !== 'undefined'
    ? JSON.parse(__firebase_config)
    : {
        apiKey: "AIzaSyB-BrneZP1lNoa6axKSHw0ooTobY1n8jjg",
        authDomain: "dailyforme-f6c9d.firebaseapp.com",
        projectId: "dailyforme-f6c9d",
        storageBucket: "dailyforme-f6c9d.firebasestorage.app",
        messagingSenderId: "943988769887",
        appId: "1:943988769887:web:212c278199f683c43e47ea",
        measurementId: "G-8ZNMNMSBT4"
      };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  
  // Çevrimdışı ve WebSocket engelleme hatalarını çözmek için Force Long Polling kullanılıyor
  const db = initializeFirestore(app, {
    experimentalForceLongPolling: true
  });
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

  /* ── Yardımcılar & Path Kuralları ── */
  const uid = () => auth.currentUser?.uid;

  // STRICT PATHS RULE 1: /artifacts/{appId}/users/{userId}/{collectionName}
  async function saveUserProfile(data) {
    if (!uid()) return;
    try {
      await setDoc(doc(db, "artifacts", appId, "users", uid(), "profile", "main"), data, { merge: true });
    } catch (err) {
      console.error("Profil kaydedilirken hata:", err);
    }
  }

  async function loadUserProfile() {
    if (!uid()) return {};
    try {
      const snap = await getDoc(doc(db, "artifacts", appId, "users", uid(), "profile", "main"));
      return snap.exists() ? snap.data() : {};
    } catch (err) {
      console.error("Profil yüklenirken çevrimdışı hatası:", err);
      return {};
    }
  }

  // Görevler
  async function saveTasks(tasks) {
    if (!uid()) return;
    try {
      await setDoc(doc(db, "artifacts", appId, "users", uid(), "tasks", "main"), { list: tasks });
    } catch (err) {
      console.error("Görevler kaydedilirken hata:", err);
    }
  }

  async function loadTasks() {
    if (!uid()) return [];
    try {
      const snap = await getDoc(doc(db, "artifacts", appId, "users", uid(), "tasks", "main"));
      return snap.exists() ? snap.data().list || [] : [];
    } catch (err) {
      console.error("Görevler yüklenirken çevrimdışı hatası:", err);
      return [];
    }
  }

  // Günlük Rapor
  async function saveReport(date, data) {
    if (!uid()) return;
    try {
      await setDoc(doc(db, "artifacts", appId, "users", uid(), "reports", date), { ...data, date });
    } catch (err) {
      console.error("Rapor kaydedilirken hata:", err);
    }
  }

  async function loadReport(date) {
    if (!uid()) return {};
    try {
      const snap = await getDoc(doc(db, "artifacts", appId, "users", uid(), "reports", date));
      return snap.exists() ? snap.data() : {};
    } catch (err) {
      console.error("Rapor yüklenirken çevrimdışı hatası:", err);
      return {};
    }
  }

  async function loadRecentReports() {
    if (!uid()) return [];
    try {
      // Rule 2: No complex queries, fetch simply and slice locally
      const snap = await getDocs(collection(db, "artifacts", appId, "users", uid(), "reports"));
      return snap.docs.map(d => d.data()).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 7);
    } catch (err) {
      console.error("Geçmiş raporlar yüklenirken çevrimdışı hatası:", err);
      return [];
    }
  }

  // Şifreli Günlük
  async function saveJournalEntry(text, mood) {
    if (!uid()) return;
    try {
      await addDoc(collection(db, "artifacts", appId, "users", uid(), "journals"), {
        text, mood, createdAt: new Date().toISOString()
      });
    } catch (err) {
      console.error("Günlük kaydedilirken hata:", err);
    }
  }

  async function loadJournalEntries() {
    if (!uid()) return [];
    try {
      const snap = await getDocs(collection(db, "artifacts", appId, "users", uid(), "journals"));
      return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    } catch (err) {
      console.error("Günlükler yüklenirken çevrimdışı hatası:", err);
      return [];
    }
  }

  async function deleteJournalEntry(id) {
    if (!uid()) return;
    try {
      await deleteDoc(doc(db, "artifacts", appId, "users", uid(), "journals", id));
    } catch (err) {
      console.error("Günlük silinirken hata:", err);
    }
  }

  // Brain Dump
  async function saveBrainDump(text) {
    if (!uid()) return;
    try {
      await addDoc(collection(db, "artifacts", appId, "users", uid(), "braindump"), {
        text, createdAt: new Date().toISOString()
      });
    } catch (err) {
      console.error("Not kaydedilirken hata:", err);
    }
  }

  async function loadBrainDumps() {
    if (!uid()) return [];
    try {
      const snap = await getDocs(collection(db, "artifacts", appId, "users", uid(), "braindump"));
      return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    } catch (err) {
      console.error("Notlar yüklenirken çevrimdışı hatası:", err);
      return [];
    }
  }

  async function deleteBrainDump(id) {
    if (!uid()) return;
    try {
      await deleteDoc(doc(db, "artifacts", appId, "users", uid(), "braindump", id));
    } catch (err) {
      console.error("Not silinirken hata:", err);
    }
  }

  /* ── Uygulama Durumu ── */
  let currentUser = null;
  let profile = {};
  let tasks = [];
  let journalLocked = true;
  let activeTab = "dashboard";
  let dragSrcIdx = null;

  /* ── Pomodoro Durumu ── */
  let pomodoroTimeLeft = 1500; // 25 dakika varsayılan
  let pomodoroInterval = null;
  let pomodoroIsRunning = false;
  let pomodoroMode = 'work'; // 'work', 'short', 'long'
  let pomodoroCustomWork = 25;
  let pomodoroCustomShort = 5;
  let pomodoroCustomLong = 15;

  /* ── Nefes Egzersizi Durumu ── */
  let breathInterval = null;
  let breathState = 'idle'; // 'in', 'holdIn', 'out', 'holdOut', 'idle'
  let breathCycleTime = 4;
  let breathTimeLeft = 4;
  let breathTotalTimer = null;
  let breathTotalDuration = 60; // saniye

  /* ── ADHD Motivasyon Sözleri ── */
  const adhdQuotes = [
    "Küçük adımlar, büyük yollara açılır. Bugün sadece tek bir küçük şeye odaklan. 🎯",
    "Zihninin hızına yetişmek zorunda değilsin; kendi ritmini bulman yeterli. 🌊",
    "Mükemmel olmak zorunda değil, sadece başlamış olmak yeterlidir. ✨",
    "Büyük hedefleri mikro parçalara böl. Beynin küçük zaferleri sever! 🧠",
    "Dikkatin dağıldığında kendine nazik ol ve sakince geri dön. 🌱",
    "Dopamin arayışını üretken adımlarla ödüllendir. Başardığın her küçük şey bir adımdır. 🚀",
    "Zihnindeki fırtınayı Beyin Boşalt paneline dök ve sadece önündeki adıma bak. 🌪️",
    "Bugün enerjin düşükse, mola vermeyi bir hak olarak gör. Dinlenmek de ilerlemenin parçasıdır. 🔋",
    "Farklı düşünmek senin süper gücün. Klasik yöntemler uymuyorsa kendi yöntemini tasarla! 💡",
    "Her tamamlanan görev, zihnindeki bir açık sekmeyi kapatmaktır. 💻",
    "Unutma: Başlamak bitirmenin yarısıdır, ama ilk adımı atmak en cesurca olanıdır. 🔥",
    "Zihnin muhteşem bir kütüphane; sakinleş, derin bir nefes al ve sadece bir kitaba odaklan. 📖"
  ];

  /* ── DOM Hazırlığı ve Başlangıç ── */
  document.addEventListener("DOMContentLoaded", () => {
    // Shimmer Loader Başlat
    showSkeleton(true);

    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          // Gerekirse anonim giriş veya normal form ile devam
        }
      } catch (err) {
        console.error("Auth init hatası:", err);
      }
    };
    initAuth();

    onAuthStateChanged(auth, async user => {
      currentUser = user;
      if (user) {
        profile = await loadUserProfile();
        
        // Streak Yönetimi
        handleStreakCalculation();

        applyTheme(profile.theme || "light");
        applyAccent(profile.accent || "indigo");
        tasks = await loadTasks();
        showApp();
        renderAll();
        showSkeleton(false);
      } else {
        showAuth();
        showSkeleton(false);
      }
    });

    /* Auth İşlemleri */
    document.getElementById("authForm").addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("authEmail").value.trim();
      const pass = document.getElementById("authPass").value;
      const isLogin = document.getElementById("authToggleMode").dataset.mode === "login";
      const errEl = document.getElementById("authError");
      errEl.textContent = "";
      showSkeleton(true);
      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          const name = document.getElementById("authName").value.trim() || "Kullanıcı";
          await updateProfile(cred.user, { displayName: name });
          await saveUserProfile({ 
            displayName: name, 
            theme: "light", 
            accent: "indigo",
            streak: 1,
            lastActiveDate: new Date().toISOString().split("T")[0],
            totalPomodoros: 0
          });
        }
      } catch (err) {
        errEl.textContent = firebaseErrorMsg(err.code);
        showSkeleton(false);
      }
    });

    document.getElementById("authToggleMode").addEventListener("click", e => {
      const isLogin = e.target.dataset.mode === "login";
      e.target.dataset.mode = isLogin ? "register" : "login";
      document.getElementById("authTitle").textContent = isLogin ? "Zihnini Düzenlemeye Başla" : "dailyFORmind'a Dön";
      e.target.textContent = isLogin ? "Zaten bir hesabın var mı? Giriş yap" : "Yeni bir başlangıç yap? Kayıt ol";
      document.getElementById("authSubmitBtn").textContent = isLogin ? "Hesap Oluştur" : "Giriş Yap";
      document.getElementById("authNameWrap").style.display = isLogin ? "block" : "none";
    });

    /* Çıkış */
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      const confirmLogout = await customConfirm("Çıkış Yap", "Hesabınızdan çıkış yapmak istediğinize emin misiniz?");
      if (confirmLogout) {
        await signOut(auth);
      }
    });

    /* Tab Değişimi */
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    /* Tema Değişimi */
    document.getElementById("themeToggle").addEventListener("click", async () => {
      const isDark = document.documentElement.classList.toggle("dark");
      const theme = isDark ? "dark" : "light";
      profile.theme = theme;
      if (uid()) await saveUserProfile({ theme });
      document.getElementById("themeToggle").textContent = isDark ? "☀️" : "🌙";
    });

    /* Görev Ekleme */
    document.getElementById("taskInput").addEventListener("keydown", async e => {
      if (e.key === "Enter") await addTask();
    });
    document.getElementById("addTaskBtn").addEventListener("click", addTask);

    /* Profil Güncelleme */
    document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);

    /* Rapor Güncelleme */
    document.getElementById("saveReportBtn").addEventListener("click", saveReport_);

    /* Günlük Kilit Sistemi */
    document.getElementById("journalUnlockBtn").addEventListener("click", checkJournalPin);
    document.getElementById("journalPinInput").addEventListener("keydown", e => {
      if (e.key === "Enter") checkJournalPin();
    });
    document.getElementById("journalLockBtn").addEventListener("click", () => {
      journalLocked = true;
      renderJournal();
    });
    document.getElementById("saveJournalBtn").addEventListener("click", saveJournalEntry_);

    /* Brain Dump */
    document.getElementById("brainDumpFab").addEventListener("click", toggleBrainDump);
    document.getElementById("closeBrainDump").addEventListener("click", () => {
      document.getElementById("brainDumpPanel").classList.add("hidden");
    });
    document.getElementById("sendBrainDump").addEventListener("click", sendBrainDump);
    document.getElementById("brainDumpText").addEventListener("keydown", e => {
      if (e.key === "Enter" && e.ctrlKey) sendBrainDump();
    });

    /* Accent Renkleri */
    document.querySelectorAll(".accent-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const accent = btn.dataset.accent;
        applyAccent(accent);
        profile.accent = accent;
        if (uid()) await saveUserProfile({ accent });
        renderProfile();
      });
    });

    /* Quiz */
    document.getElementById("saveQuizBtn").addEventListener("click", saveQuiz);

    /* Rapor Tarih Seçici Değişimi */
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("reportDate").value = today;
    document.getElementById("reportDate").addEventListener("change", async e => {
      const r = await loadReport(e.target.value);
      document.getElementById("reportHow").value = r.how || "";
      document.getElementById("reportAchieved").value = r.achieved || "";
      document.getElementById("reportHard").value = r.hard || "";
      // Mood ve Enerji seçicilerini güncelle
      setMoodSelection(r.mood || "");
      document.getElementById("reportEnergy").value = r.energy || 3;
      updateEnergyDisplay(r.energy || 3);
    });

    /* Klavye Kısayolları */
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.altKey) && e.key >= "1" && e.key <= "7") {
        const activeEl = document.activeElement;
        if (activeEl && (activeEl.tagName === "INPUT" || activeEl.tagName === "TEXTAREA")) return;
        const tabs = ["dashboard", "tasks", "pomodoro", "report", "journal", "quiz", "profile"];
        const target = tabs[parseInt(e.key) - 1];
        if (target) {
          e.preventDefault();
          switchTab(target);
        }
      }
    });

    /* Scroll To Top */
    const scrollTopBtn = document.getElementById("scrollTopBtn");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        scrollTopBtn.classList.remove("hidden");
      } else {
        scrollTopBtn.classList.add("hidden");
      }
    });
    scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });

  /* ── Yardımcı Fonksiyonlar ── */
  function showSkeleton(show) {
    const skeleton = document.getElementById("skeletonLoader");
    if (show) {
      skeleton.classList.remove("hidden");
    } else {
      skeleton.classList.add("hidden");
    }
  }

  function showAuth() {
    document.getElementById("authScreen").style.display = "flex";
    document.getElementById("appScreen").style.display = "none";
    document.getElementById("brainDumpFab").classList.add("hidden");
  }

  function showApp() {
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "flex";
    document.getElementById("brainDumpFab").classList.remove("hidden");
  }

  /* Streak Hesaplama Mantığı */
  async function handleStreakCalculation() {
    const todayStr = new Date().toISOString().split("T")[0];
    const lastActive = profile.lastActiveDate || "";
    let currentStreak = profile.streak || 0;

    if (lastActive !== todayStr) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split("T")[0];

      if (lastActive === yesterdayStr) {
        currentStreak += 1;
      } else if (lastActive === "") {
        currentStreak = 1;
      } else {
        currentStreak = 1; // Bozulduysa sıfırla/yeniden başlat
      }
      
      profile.streak = currentStreak;
      profile.lastActiveDate = todayStr;
      await saveUserProfile({ streak: currentStreak, lastActiveDate: todayStr });
    }
  }

  function renderAll() {
    renderDashboard();
    renderTasks();
    renderProfile();
    renderJournal();
    renderBrainDumps();
    loadReportForToday();
    loadQuiz();
    updateHeaderAvatar();
  }

  function switchTab(tab) {
    activeTab = tab;
    
    // Smooth transition
    const mainArea = document.querySelector(".app-main");
    mainArea.style.opacity = "0";
    mainArea.style.transform = "translateY(8px)";
    
    setTimeout(() => {
      document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.toggle("tab-active", b.dataset.tab === tab);
      });
      document.querySelectorAll(".tab-panel").forEach(p => {
        p.classList.toggle("hidden", p.dataset.panel !== tab);
      });
      
      if (tab === "dashboard") renderDashboard();
      if (tab === "journal") renderJournal();
      if (tab === "braindump_list") renderBrainDumps();
      if (tab === "report") loadRecentReportsList();

      mainArea.style.opacity = "1";
      mainArea.style.transform = "translateY(0)";
    }, 150);
  }

  /* ── 4. Dashboard (Yeni Ana Sayfa) ── */
  function renderDashboard() {
    // Hoş geldin mesajı
    const hour = new Date().getHours();
    const name = profile.displayName || currentUser?.displayName || "Ziyaretçi";
    let greeting = "Günaydın";
    if (hour >= 12 && hour < 17) greeting = "İyi Günler";
    else if (hour >= 17 && hour < 22) greeting = "İyi Akşamlar";
    else if (hour >= 22 || hour < 5) greeting = "İyi Geceler";

    document.getElementById("dashboardGreeting").innerHTML = `${greeting}, <span class="font-extrabold text-accent">${escHtml(name)}</span>! 🌟`;

    // İlerleme Dairesi
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

    const circle = document.getElementById("dashboardProgressCircle");
    const textVal = document.getElementById("dashboardProgressText");
    const r = 40;
    const circ = 2 * Math.PI * r;
    circle.style.strokeDasharray = circ;
    circle.style.strokeDashoffset = circ - (percent / 100) * circ;
    textVal.textContent = `%${percent}`;

    document.getElementById("dashboardProgressStats").textContent = `${total} Görevden ${completed}'i Tamamlandı`;

    // Streak Sayacı
    document.getElementById("dashboardStreakText").innerHTML = `Streak Günün: <span class="text-amber-500 font-bold">${profile.streak || 1} Gün 🔥</span>`;

    // Motivasyon Sözü
    const savedQuoteIdx = Math.floor(Math.random() * adhdQuotes.length);
    document.getElementById("dashboardQuote").textContent = adhdQuotes[savedQuoteIdx];

    // Özet Bilgiler
    document.getElementById("summaryTasks").textContent = `${completed}/${total} Görev`;
    
    // Bugün rapor yazıldı mı?
    const todayStr = new Date().toISOString().split("T")[0];
    loadReport(todayStr).then(r => {
      const checkEl = document.getElementById("summaryReportCheck");
      if (r.how || r.achieved) {
        checkEl.innerHTML = "📝 Yazıldı <span class='text-green-500 font-bold'>✓</span>";
      } else {
        checkEl.innerHTML = "📝 Yazılmadı <span class='text-amber-500 font-bold'>✕</span>";
      }
    });
  }

  /* ── 5. Pomodoro Zamanlayıcı ⏱️ ── */
  window._setPomodoroMode = (mode) => {
    pomodoroMode = mode;
    document.querySelectorAll(".pomo-mode-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.mode === mode);
    });

    if (mode === 'work') pomodoroTimeLeft = pomodoroCustomWork * 60;
    else if (mode === 'short') pomodoroTimeLeft = pomodoroCustomShort * 60;
    else if (mode === 'long') pomodoroTimeLeft = pomodoroCustomLong * 60;

    updatePomodoroDisplay();
    if (pomodoroIsRunning) {
      clearInterval(pomodoroInterval);
      pomodoroIsRunning = false;
      document.getElementById("pomoStartBtn").textContent = "▶ Başlat";
    }
  };

  function updatePomodoroDisplay() {
    const mins = Math.floor(pomodoroTimeLeft / 60);
    const secs = pomodoroTimeLeft % 60;
    document.getElementById("pomoTimerText").textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

    // SVG Progress
    let max = 1500;
    if (pomodoroMode === 'work') max = pomodoroCustomWork * 60;
    else if (pomodoroMode === 'short') max = pomodoroCustomShort * 60;
    else if (pomodoroMode === 'long') max = pomodoroCustomLong * 60;

    const percent = ((max - pomodoroTimeLeft) / max) * 100;
    const circle = document.getElementById("pomoProgressCircle");
    const r = 90;
    const circ = 2 * Math.PI * r;
    circle.style.strokeDasharray = circ;
    circle.style.strokeDashoffset = circ - (percent / 100) * circ;
  }

  window._togglePomodoro = () => {
    if (pomodoroIsRunning) {
      clearInterval(pomodoroInterval);
      pomodoroIsRunning = false;
      document.getElementById("pomoStartBtn").textContent = "▶ Başlat";
      document.getElementById("pomoStartBtn").className = "btn-primary pomo-btn flex-1";
    } else {
      pomodoroIsRunning = true;
      document.getElementById("pomoStartBtn").textContent = "⏸ Duraklat";
      document.getElementById("pomoStartBtn").className = "btn-secondary pomo-btn flex-1";
      pomodoroInterval = setInterval(() => {
        pomodoroTimeLeft--;
        if (pomodoroTimeLeft <= 0) {
          clearInterval(pomodoroInterval);
          pomodoroIsRunning = false;
          playTimerAlert();
          fireConfetti();
          
          if (pomodoroMode === 'work') {
            profile.totalPomodoros = (profile.totalPomodoros || 0) + 1;
            saveUserProfile({ totalPomodoros: profile.totalPomodoros });
            showToast("Harika çalışma seansı bitti! 🏆");
            _setPomodoroMode('short');
          } else {
            showToast("Mola bitti, odaklanmaya hazır mısın? 🚀");
            _setPomodoroMode('work');
          }
          renderDashboard();
          renderProfile();
        }
        updatePomodoroDisplay();
      }, 1000);
    }
  };

  window._resetPomodoro = () => {
    clearInterval(pomodoroInterval);
    pomodoroIsRunning = false;
    document.getElementById("pomoStartBtn").textContent = "▶ Başlat";
    document.getElementById("pomoStartBtn").className = "btn-primary pomo-btn flex-1";
    _setPomodoroMode(pomodoroMode);
  };

  window._updatePomoSettings = () => {
    pomodoroCustomWork = parseInt(document.getElementById("pomoSetWork").value) || 25;
    pomodoroCustomShort = parseInt(document.getElementById("pomoSetShort").value) || 5;
    pomodoroCustomLong = parseInt(document.getElementById("pomoSetLong").value) || 15;
    showToast("Süreler güncellendi ⏱️");
    _setPomodoroMode(pomodoroMode);
  };

  function playTimerAlert() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.2);
      osc.start();
      osc.stop(ctx.currentTime + 1.2);
    } catch (e) {
      console.log("Audio API çalma hatası:", e);
    }
  }

  /* ── 6. Görev Modülü İyileştirmeleri ── */
  async function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (!text) return;

    const prio = document.getElementById("taskPriority").value;
    const cat = document.getElementById("taskCategory").value;

    tasks.push({ 
      id: Date.now(), 
      text, 
      done: false,
      priority: prio,
      category: cat,
      subtasks: []
    });

    input.value = "";
    await saveTasks(tasks);
    renderTasks();
    renderDashboard();
    showToast("Görev eklendi 🎯");
  }

  async function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    await saveTasks(tasks);
    renderTasks();
    renderDashboard();
    if (t.done) {
      fireConfetti();
      showToast("Tebrikler! Dopamin yüklemesi yapıldı 🎉");
    }
  }

  async function deleteTask(id) {
    const check = await customConfirm("Görevi Sil", "Bu görevi silmek istediğinize emin misiniz?");
    if (!check) return;
    tasks = tasks.filter(t => t.id !== id);
    await saveTasks(tasks);
    renderTasks();
    renderDashboard();
    showToast("Görev silindi");
  }

  async function moveTask(idx, dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= tasks.length) return;
    [tasks[idx], tasks[newIdx]] = [tasks[newIdx], tasks[idx]];
    await saveTasks(tasks);
    renderTasks();
  }

  // Alt Görev (Subtask) Yönetimi
  window._addSubtask = async (taskId) => {
    const input = document.getElementById(`subtaskInput-${taskId}`);
    const text = input.value.trim();
    if (!text) return;

    const task = tasks.find(t => t.id === taskId);
    if (!task) return;

    if (!task.subtasks) task.subtasks = [];
    task.subtasks.push({
      id: Date.now(),
      text,
      done: false
    });

    input.value = "";
    await saveTasks(tasks);
    renderTasks();
    showToast("Alt görev eklendi ✓");
  };

  window._toggleSubtask = async (taskId, subId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const sub = task.subtasks.find(s => s.id === subId);
    if (!sub) return;

    sub.done = !sub.done;
    await saveTasks(tasks);
    renderTasks();
    if (sub.done) fireConfetti();
  };

  window._deleteSubtask = async (taskId, subId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    task.subtasks = task.subtasks.filter(s => s.id !== subId);
    await saveTasks(tasks);
    renderTasks();
  };

  // Filtreleme & Arama
  let activeFilter = "all";
  window._filterTasks = (filter) => {
    activeFilter = filter;
    document.querySelectorAll(".filter-chip").forEach(c => {
      c.classList.toggle("active", c.dataset.filter === filter);
    });
    renderTasks();
  };

  // Arama Tetikleyici
  document.getElementById("taskSearch").addEventListener("input", () => {
    renderTasks();
  });

  function renderTasks() {
    const list = document.getElementById("taskList");
    const searchVal = document.getElementById("taskSearch").value.toLowerCase();
    
    // Üst İlerleme Çubuğu
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    const pct = total > 0 ? (completed / total) * 100 : 0;
    document.getElementById("taskProgressFill").style.width = `${pct}%`;
    document.getElementById("taskProgressRatio").textContent = `${completed}/${total}`;

    let filtered = tasks;

    // Arama
    if (searchVal) {
      filtered = filtered.filter(t => t.text.toLowerCase().includes(searchVal));
    }

    // Filtre
    if (activeFilter === "active") {
      filtered = filtered.filter(t => !t.done);
    } else if (activeFilter === "completed") {
      filtered = filtered.filter(t => t.done);
    } else if (activeFilter === "prio-high") {
      filtered = filtered.filter(t => t.priority === "high");
    }

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-state text-center py-8">
          <span style="font-size:3rem;">🎯</span>
          <p class="muted mt-2 text-sm">Burada hiçbir görev yok. Yeni bir odak ekle!</p>
        </div>
      `;
      return;
    }

    list.innerHTML = filtered.map((t, i) => {
      const prioEmoji = t.priority === "high" ? "🔴" : t.priority === "medium" ? "🟡" : "🟢";
      const prioText = t.priority === "high" ? "Yüksek" : t.priority === "medium" ? "Orta" : "Düşük";
      const catClass = `cat-${t.category || "kisisel"}`;
      const catLabel = getCategoryLabel(t.category);

      const hasSubtasks = t.subtasks && t.subtasks.length > 0;
      const subCompleted = hasSubtasks ? t.subtasks.filter(s => s.done).length : 0;
      const subTotal = hasSubtasks ? t.subtasks.length : 0;

      return `
        <div class="task-card ${t.done ? "done" : ""}" draggable="true" data-idx="${i}" id="task-${t.id}">
          <div class="task-main-row">
            <button class="check-btn" onclick="window._toggleTask(${t.id})" aria-label="Tamamla">
              ${t.done ? checkIcon() : emptyCheckIcon()}
            </button>
            <div class="task-content">
              <span class="task-text">${escHtml(t.text)}</span>
              <div class="task-meta-chips">
                <span class="meta-chip prio-${t.priority || "medium"}">${prioEmoji} ${prioText}</span>
                <span class="meta-chip ${catClass}">🏷️ ${catLabel}</span>
                ${hasSubtasks ? `<span class="meta-chip sub-stats">📋 Alt Görev (${subCompleted}/${subTotal})</span>` : ""}
              </div>
            </div>
            <div class="task-actions">
              <button onclick="window._moveTask(${i}, -1)" class="icon-btn" title="Yukarı">↑</button>
              <button onclick="window._moveTask(${i}, 1)"  class="icon-btn" title="Aşağı">↓</button>
              <button onclick="window._toggleSubtaskPanel(${t.id})" class="icon-btn" title="Alt Görevler">⚙️</button>
              <button onclick="window._deleteTask(${t.id})" class="icon-btn del" title="Sil">✕</button>
            </div>
          </div>

          <!-- Alt Görevler Paneli -->
          <div id="subtaskPanel-${t.id}" class="subtask-panel hidden">
            <div class="subtask-list mt-3">
              ${(t.subtasks || []).map(s => `
                <div class="subtask-item ${s.done ? "done" : ""}">
                  <input type="checkbox" ${s.done ? "checked" : ""} 
                         onclick="window._toggleSubtask(${t.id}, ${s.id})" />
                  <span class="subtask-text">${escHtml(s.text)}</span>
                  <button class="sub-del-btn" onclick="window._deleteSubtask(${t.id}, ${s.id})">✕</button>
                </div>
              `).join("")}
            </div>
            <div class="subtask-input-wrap mt-2">
              <input type="text" id="subtaskInput-${t.id}" placeholder="Alt görev ekle..." />
              <button class="btn-secondary" onclick="window._addSubtask(${t.id})">+ Ekle</button>
            </div>
          </div>
        </div>
      `;
    }).join("");

    // Drag & Drop
    list.querySelectorAll(".task-card").forEach(el => {
      el.addEventListener("dragstart", e => {
        dragSrcIdx = +el.dataset.idx;
        e.dataTransfer.effectAllowed = "move";
      });
      el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over"); });
      el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
      el.addEventListener("drop", async e => {
        e.preventDefault();
        el.classList.remove("drag-over");
        const targetIdx = +el.dataset.idx;
        if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
        const moved = tasks.splice(dragSrcIdx, 1)[0];
        tasks.splice(targetIdx, 0, moved);
        dragSrcIdx = null;
        await saveTasks(tasks);
        renderTasks();
      });
    });
  }

  window._toggleSubtaskPanel = (id) => {
    const el = document.getElementById(`subtaskPanel-${id}`);
    el.classList.toggle("hidden");
  };

  function getCategoryLabel(cat) {
    const map = { is: "İş", kisisel: "Kişisel", saglik: "Sağlık", egitim: "Eğitim" };
    return map[cat] || "Kişisel";
  }

  window._toggleTask = (id) => toggleTask(id);
  window._deleteTask = (id) => deleteTask(id);
  window._moveTask   = (i, d) => moveTask(i, d);
