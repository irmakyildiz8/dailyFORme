<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, signOut, updateProfile, signInWithCustomToken
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, collection,
    addDoc, getDocs, query, orderBy, deleteDoc, writeBatch
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // PROD NOTU: Firestore Güvenlik Kuralları (Security Rules) yapılandırılmalıdır.
  const firebaseConfig = typeof __firebase_config !== 'undefined'
    ? JSON.parse(__firebase_config)
    : {
        apiKey: "AIzaSyB-BrneZP1lNoa6axKSHw0ooTobY1n8jjg",
        authDomain: "dailyforme-f6c9d.firebaseapp.com",
        projectId: "dailyforme-f6c9d",
        storageBucket: "dailyforme-f6c9d.firebasestorage.app",
        messagingSenderId: "943988769887",
        appId: "1:943988769887:web:212c278199f683c43e47ea",
        measurementId: "G-8ZNMNMSBT4"
      };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
  const uid = () => auth.currentUser?.uid;

  async function saveUserProfile(data) {
    if (!uid()) return;
    try { await setDoc(doc(db, "artifacts", appId, "users", uid(), "profile", "main"), data, { merge: true }); }
    catch (err) { console.error("Profil kayıt hatası:", err); }
  }

  async function loadUserProfile() {
    if (!uid()) return {};
    try {
      const snap = await getDoc(doc(db, "artifacts", appId, "users", uid(), "profile", "main"));
      return snap.exists() ? snap.data() : {};
    } catch (err) { console.error("Profil yükleme hatası:", err); return {}; }
  }

  async function saveTasks(tasks) {
    if (!uid()) return;
    try { await setDoc(doc(db, "artifacts", appId, "users", uid(), "tasks", "main"), { list: tasks }); }
    catch (err) { console.error("Görev kayıt hatası:", err); }
  }

  async function loadTasks() {
    if (!uid()) return [];
    try {
      const snap = await getDoc(doc(db, "artifacts", appId, "users", uid(), "tasks", "main"));
      return snap.exists() ? snap.data().list || [] : [];
    } catch (err) { console.error("Görev yükleme hatası:", err); return []; }
  }

  async function saveReport(date, data) {
    if (!uid()) return;
    try { await setDoc(doc(db, "artifacts", appId, "users", uid(), "reports", date), { ...data, date }); }
    catch (err) { console.error("Rapor kayıt hatası:", err); }
  }

  async function loadReport(date) {
    if (!uid()) return {};
    try {
      const snap = await getDoc(doc(db, "artifacts", appId, "users", uid(), "reports", date));
      return snap.exists() ? snap.data() : {};
    } catch (err) { console.error("Rapor yükleme hatası:", err); return {}; }
  }

  async function loadRecentReports() {
    if (!uid()) return [];
    try {
      const snap = await getDocs(collection(db, "artifacts", appId, "users", uid(), "reports"));
      return snap.docs.map(d => d.data()).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 7);
    } catch (err) { console.error("Geçmiş rapor yükleme hatası:", err); return []; }
  }

  async function saveJournalEntry(text, mood) {
    if (!uid()) return;
    try { await addDoc(collection(db, "artifacts", appId, "users", uid(), "journals"), { text, mood, createdAt: new Date().toISOString() }); }
    catch (err) { console.error("Günlük kayıt hatası:", err); }
  }

  async function loadJournalEntries() {
    if (!uid()) return [];
    try {
      const snap = await getDocs(collection(db, "artifacts", appId, "users", uid(), "journals"));
      return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    } catch (err) { console.error("Günlük yükleme hatası:", err); return []; }
  }

  async function deleteJournalEntry(id) {
    if (!uid()) return;
    try { await deleteDoc(doc(db, "artifacts", appId, "users", uid(), "journals", id)); }
    catch (err) { console.error("Günlük silme hatası:", err); }
  }

  async function saveBrainDump(text) {
    if (!uid()) return;
    try { await addDoc(collection(db, "artifacts", appId, "users", uid(), "braindump"), { text, createdAt: new Date().toISOString() }); }
    catch (err) { console.error("Not kayıt hatası:", err); }
  }

  async function loadBrainDumps() {
    if (!uid()) return [];
    try {
      const snap = await getDocs(collection(db, "artifacts", appId, "users", uid(), "braindump"));
      return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    } catch (err) { console.error("Not yükleme hatası:", err); return []; }
  }

  async function deleteBrainDump(id) {
    if (!uid()) return;
    try { await deleteDoc(doc(db, "artifacts", appId, "users", uid(), "braindump", id)); }
    catch (err) { console.error("Not silme hatası:", err); }
  }

  let currentUser = null;
  let profile = {};
  let tasks = [];
  let journalLocked = true;
  let activeTab = "dashboard";
  let dragSrcIdx = null;
  let audioCtx = null;
  let isSwitchingTab = false;

  let pomodoroTimeLeft = 1500; 
  let pomodoroInterval = null;
  let pomodoroIsRunning = false;
  let pomodoroMode = 'work'; 
  let pomodoroCustomWork = 25;
  let pomodoroCustomShort = 5;
  let pomodoroCustomLong = 15;

  let breathInterval = null;
  let breathState = 'idle'; 
  let breathCycleTime = 4;
  let breathTimeLeft = 4;
  let breathTotalTimer = null;
  let breathTotalDuration = 60;

  const adhdQuotes = [
    "Küçük adımlar, büyük yollara açılır. Bugün sadece tek bir küçük şeye odaklan.",
    "Zihninin hızına yetişmek zorunda değilsin; kendi ritmini bulman yeterli.",
    "Mükemmel olmak zorunda değil, sadece başlamış olmak yeterlidir.",
    "Büyük hedefleri mikro parçalara böl. Beynin küçük zaferleri sever!",
    "Dikkatin dağıldığında kendine nazik ol ve sakince geri dön.",
    "Dopamin arayışını üretken adımlarla ödüllendir.",
    "Zihnindeki fırtınayı Beyin Boşalt paneline dök ve sadece önündeki adıma bak.",
    "Farklı düşünmek senin süper gücün. Klasik yöntemler uymuyorsa kendi yöntemini tasarla!"
  ];

  document.addEventListener("DOMContentLoaded", () => {
    showSkeleton(true);
    requestNotificationPermission();

    const setupAuthAndData = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        }
      } catch (err) { console.error("Auth init hatası:", err); }

      onAuthStateChanged(auth, async user => {
        currentUser = user;
        if (user) {
          try {
            profile = await loadUserProfile();
            await handleStreakCalculation();
            applyTheme(profile.theme || "light");
            applyAccent(profile.accent || "indigo");
            tasks = await loadTasks();
            showApp();
            renderAll();
          } catch (err) {
            console.error("Başlangıç verisi hatası:", err);
            showApp();
          } finally {
            showSkeleton(false);
          }
        } else {
          showAuth();
          showSkeleton(false);
        }
      });
    };

    setupAuthAndData();

    document.getElementById("authForm")?.addEventListener("submit", async e => {
      e.preventDefault();
      const email = document.getElementById("authEmail")?.value.trim();
      const pass = document.getElementById("authPass")?.value;
      const isLogin = document.getElementById("authToggleMode")?.dataset.mode === "login";
      const errEl = document.getElementById("authError");
      if(errEl) errEl.textContent = "";
      showSkeleton(true);
      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          const name = document.getElementById("authName")?.value.trim() || "Kullanıcı";
          await updateProfile(cred.user, { displayName: name });
          await saveUserProfile({ 
            displayName: name, theme: "light", accent: "indigo",
            streak: 1, lastActiveDate: new Date().toISOString().split("T")[0], totalPomodoros: 0
          });
        }
      } catch (err) { 
        if(errEl) errEl.textContent = firebaseErrorMsg(err.code); 
      } 
      finally { showSkeleton(false); }
    });

    document.getElementById("authToggleMode")?.addEventListener("click", e => {
      const isLogin = e.target.dataset.mode === "login";
      e.target.dataset.mode = isLogin ? "register" : "login";
      const authTitle = document.getElementById("authTitle");
      if(authTitle) authTitle.textContent = isLogin ? "Hoş Geldiniz" : "Kayıt Ol";
      e.target.textContent = isLogin ? "Zaten bir hesabınız var mı? Giriş yapın" : "Yeni misiniz? Hemen kayıt olun";
      const submitBtn = document.getElementById("authSubmitBtn");
      if(submitBtn) submitBtn.textContent = isLogin ? "Hesap Oluştur" : "Giriş Yap";
      const nameWrap = document.getElementById("authNameWrap");
      if(nameWrap) nameWrap.classList.toggle("hidden", isLogin);
    });

    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      const confirmLogout = await customConfirm("Çıkış Yap", "Hesabınızdan çıkış yapmak istediğinize emin misiniz?");
      if (confirmLogout) await signOut(auth);
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn?.addEventListener("click", () => switchTab(btn.dataset.tab, btn));
    });

    document.getElementById("themeToggle")?.addEventListener("click", async () => {
      const isDark = document.documentElement.classList.toggle("dark");
      const theme = isDark ? "dark" : "light";
      profile.theme = theme;
      if (uid()) await saveUserProfile({ theme });
    });

    document.getElementById("taskInput")?.addEventListener("keydown", async e => { if (e.key === "Enter") await addTask(); });
    document.getElementById("addTaskBtn")?.addEventListener("click", addTask);
    document.getElementById("saveProfileBtn")?.addEventListener("click", saveProfile);
    document.getElementById("saveReportBtn")?.addEventListener("click", saveReport_);
    
    document.getElementById("journalUnlockBtn")?.addEventListener("click", checkJournalPin);
    document.getElementById("journalPinInput")?.addEventListener("keydown", e => { if (e.key === "Enter") checkJournalPin(); });
    document.getElementById("journalLockBtn")?.addEventListener("click", () => { journalLocked = true; renderJournal(); });
    document.getElementById("saveJournalBtn")?.addEventListener("click", saveJournalEntry_);

    document.getElementById("brainDumpFab")?.addEventListener("click", toggleBrainDump);
    document.getElementById("closeBrainDump")?.addEventListener("click", () => { document.getElementById("brainDumpPanel")?.classList.add("hidden"); });
    document.getElementById("sendBrainDump")?.addEventListener("click", sendBrainDump);
    document.getElementById("brainDumpText")?.addEventListener("keydown", e => { if (e.key === "Enter" && e.ctrlKey) sendBrainDump(); });

    document.querySelectorAll(".accent-btn").forEach(btn => {
      btn?.addEventListener("click", async () => {
        const accent = btn.dataset.accent;
        applyAccent(accent);
        profile.accent = accent;
        if (uid()) await saveUserProfile({ accent });
        renderProfile();
      });
    });

    document.getElementById("saveQuizBtn")?.addEventListener("click", saveQuiz);
    
    const today = new Date().toISOString().split("T")[0];
    const reportDateInput = document.getElementById("reportDate");
    if(reportDateInput) reportDateInput.value = today;
    
    if(reportDateInput) {
      reportDateInput.addEventListener("change", async e => {
        showSkeleton(true);
        await loadReportForToday();
        showSkeleton(false);
      });
    }

    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.altKey) && e.key >= "1" && e.key <= "7") {
        const activeEl = document.activeElement;
        if (activeEl && (activeEl.tagName === "INPUT" || activeEl.tagName === "TEXTAREA")) return;
        const tabs = ["dashboard", "tasks", "pomodoro", "report", "journal", "quiz", "profile"];
        const target = tabs[parseInt(e.key) - 1];
        if (target) { 
          e.preventDefault(); 
          const btn = document.querySelector(`.tab-btn[data-tab="${target}"]`);
          switchTab(target, btn); 
        }
      }
    });

    const scrollTopBtn = document.getElementById("scrollTopBtn");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) scrollTopBtn?.classList.remove("hidden");
      else scrollTopBtn?.classList.add("hidden");
    });
    scrollTopBtn?.addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }); });
  });

  function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
  }

  function notifyUser(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body });
    }
  }

  async function hashPin(pin) {
    const msgBuffer = new TextEncoder().encode(pin);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function showSkeleton(show) {
    const skeleton = document.getElementById("skeletonLoader");
    if(!skeleton) return;
    if (show) skeleton.classList.remove("hidden");
    else skeleton.classList.add("hidden");
  }

  function showAuth() {
    const authScreen = document.getElementById("authScreen");
    const appScreen = document.getElementById("appScreen");
    const fab = document.getElementById("brainDumpFab");
    if(authScreen) authScreen.classList.remove("hidden");
    if(appScreen) appScreen.classList.add("hidden");
    if(fab) fab.classList.add("hidden");
  }

  function showApp() {
    const authScreen = document.getElementById("authScreen");
    const appScreen = document.getElementById("appScreen");
    const fab = document.getElementById("brainDumpFab");
    if(authScreen) authScreen.classList.add("hidden");
    if(appScreen) appScreen.classList.remove("hidden");
    if(fab) fab.classList.remove("hidden");
  }

  async function handleStreakCalculation() {
    const todayStr = new Date().toISOString().split("T")[0];
    const lastActive = profile.lastActiveDate || "";
    let currentStreak = profile.streak || 0;

    if (lastActive !== todayStr) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split("T")[0];

      if (lastActive === yesterdayStr) {
        currentStreak += 1;
      } else if (lastActive === "") {
        currentStreak = 1;
        setTimeout(() => showToast("Streak başladı! 🔥"), 1000);
      } else {
        currentStreak = 1; 
      }
      
      profile.streak = currentStreak;
      profile.lastActiveDate = todayStr;
      await saveUserProfile({ streak: currentStreak, lastActiveDate: todayStr });
    }
  }

  function renderAll() {
    renderDashboard();
    renderTasks();
    renderProfile();
    renderJournal();
    renderBrainDumps();
    loadReportForToday();
    loadQuiz();
    updateHeaderAvatar();
  }

  function switchTab(tab, btnEl) {
    if (isSwitchingTab) return;
    isSwitchingTab = true;
    activeTab = tab;
    
    if (btnEl && btnEl.scrollIntoView) btnEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    
    const mainArea = document.querySelector(".app-main");
    if(mainArea) {
      mainArea.style.opacity = "0";
      mainArea.style.pointerEvents = "none";
    }
    
    setTimeout(() => {
      document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.toggle("tab-active", b.dataset.tab === tab);
        b.setAttribute("aria-selected", b.dataset.tab === tab);
      });
      document.querySelectorAll(".tab-panel").forEach(p => {
        p.classList.toggle("hidden", p.dataset.panel !== tab);
      });
      
      if (tab === "dashboard") renderDashboard();
      if (tab === "journal") renderJournal();
      if (tab === "braindump_list") renderBrainDumps();
      if (tab === "report") loadRecentReportsList();

      if(mainArea) {
        mainArea.style.opacity = "1";
        mainArea.style.pointerEvents = "auto";
      }
      isSwitchingTab = false;
    }, 250);
  }

  function renderDashboard() {
    const name = profile.displayName || currentUser?.displayName || "Kullanıcı";
    const greetingEl = document.getElementById("dashboardGreeting");
    if(greetingEl) greetingEl.textContent = `Hoş geldiniz, ${escHtml(name)}.`;

    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

    const circle = document.getElementById("dashboardProgressCircle");
    if(circle) {
      const r = 40;
      const circ = 2 * Math.PI * r;
      circle.style.strokeDasharray = circ;
      circle.style.strokeDashoffset = circ - (percent / 100) * circ;
    }
    
    const progressTextEl = document.getElementById("dashboardProgressText");
    if(progressTextEl) progressTextEl.textContent = `%${percent}`;
    
    const statsEl = document.getElementById("dashboardProgressStats");
    if(statsEl) statsEl.textContent = `${total} Görevden ${completed}'i Tamamlandı`;
    
    const streakEl = document.getElementById("dashboardStreakText");
    if(streakEl) streakEl.innerHTML = `<span class="display-number text-amber-500">${profile.streak || 1}</span><span class="text-sm font-bold ml-2">Günlük Seri</span>`;

    const savedQuoteIdx = Math.floor(Math.random() * adhdQuotes.length);
    const quoteEl = document.getElementById("dashboardQuote");
    if(quoteEl) quoteEl.textContent = adhdQuotes[savedQuoteIdx];
    
    renderHeatmap();

    const todayStr = new Date().toISOString().split("T")[0];
    loadReport(todayStr).then(r => {
      const checkEl = document.getElementById("summaryReportCheck");
      if (checkEl) {
        if (r.how || r.achieved) checkEl.innerHTML = "<span class='badge ok'>Yazıldı</span>";
        else checkEl.innerHTML = "<span class='badge warn'>Bekliyor</span>";
      }
    });
  }

  function renderHeatmap() {
    const heatmapEl = document.getElementById("streakHeatmap");
    if (!heatmapEl) return;
    heatmapEl.innerHTML = '';
    const streak = profile.streak || 0;
    for (let i = 27; i >= 0; i--) {
      const box = document.createElement("div");
      box.className = "heatmap-box";
      if (i < streak) {
        const intensity = Math.min(1, 0.4 + (streak / 30) * 0.6);
        box.style.backgroundColor = `rgba(var(--accent-rgb), ${intensity})`;
        box.style.borderColor = `rgba(var(--accent-rgb), 1)`;
      }
      heatmapEl.appendChild(box);
    }
  }

  window._setPomodoroMode = (mode) => {
    pomodoroMode = mode;
    document.querySelectorAll(".pomo-mode-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.mode === mode);
      b.setAttribute("aria-pressed", b.dataset.mode === mode);
    });

    if (mode === 'work') pomodoroTimeLeft = pomodoroCustomWork * 60;
    else if (mode === 'short') pomodoroTimeLeft = pomodoroCustomShort * 60;
    else if (mode === 'long') pomodoroTimeLeft = pomodoroCustomLong * 60;

    updatePomodoroDisplay();
    if (pomodoroIsRunning) {
      clearInterval(pomodoroInterval);
      pomodoroIsRunning = false;
      const startBtn = document.getElementById("pomoStartBtn");
      if(startBtn) startBtn.textContent = "Başlat";
    }
  };

  function updatePomodoroDisplay() {
    const mins = Math.floor(pomodoroTimeLeft / 60);
    const secs = pomodoroTimeLeft % 60;
    const textEl = document.getElementById("pomoTimerText");
    if(textEl) textEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

    let max = 1500;
    if (pomodoroMode === 'work') max = pomodoroCustomWork * 60;
    else if (pomodoroMode === 'short') max = pomodoroCustomShort * 60;
    else if (pomodoroMode === 'long') max = pomodoroCustomLong * 60;

    const percent = ((max - pomodoroTimeLeft) / max) * 100;
    const circle = document.getElementById("pomoProgressCircle");
    if(circle) {
      const r = 90;
      const circ = 2 * Math.PI * r;
      circle.style.strokeDasharray = circ;
      circle.style.strokeDashoffset = circ - (percent / 100) * circ;
    }
  }

  window._togglePomodoro = () => {
    const startBtn = document.getElementById("pomoStartBtn");
    if (pomodoroIsRunning) {
      clearInterval(pomodoroInterval);
      pomodoroIsRunning = false;
      if(startBtn) startBtn.textContent = "Devam Et";
    } else {
      pomodoroIsRunning = true;
      if(startBtn) startBtn.textContent = "Duraklat";
      pomodoroInterval = setInterval(() => {
        pomodoroTimeLeft--;
        if (pomodoroTimeLeft <= 0) {
          clearInterval(pomodoroInterval);
          pomodoroIsRunning = false;
          playTimerAlert();
          loadConfetti();
          notifyUser("Süre Doldu", "Pomodoro seansınız tamamlandı.");
          
          if (pomodoroMode === 'work') {
            profile.totalPomodoros = (profile.totalPomodoros || 0) + 1;
            saveUserProfile({ totalPomodoros: profile.totalPomodoros });
            showToast("Çalışma seansı bitti.");
            _setPomodoroMode('short');
          } else {
            showToast("Mola bitti.");
            _setPomodoroMode('work');
          }
          renderDashboard();
          renderProfile();
        }
        updatePomodoroDisplay();
      }, 1000);
    }
  };

  window._resetPomodoro = () => {
    clearInterval(pomodoroInterval);
    pomodoroIsRunning = false;
    const startBtn = document.getElementById("pomoStartBtn");
    if(startBtn) startBtn.textContent = "Başlat";
    _setPomodoroMode(pomodoroMode);
  };

  window._updatePomoSettings = () => {
    pomodoroCustomWork = parseInt(document.getElementById("pomoSetWork")?.value) || 25;
    pomodoroCustomShort = parseInt(document.getElementById("pomoSetShort")?.value) || 5;
    pomodoroCustomLong = parseInt(document.getElementById("pomoSetLong")?.value) || 15;
    showToast("Süreler güncellendi.");
    _setPomodoroMode(pomodoroMode);
  };

  function playTimerAlert() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.2);
    } catch (e) { console.error("Audio API hatası:", e); }
  }

  async function addTask() {
    const input = document.getElementById("taskInput");
    if(!input) return;
    const text = input.value.trim();
    if (!text) return;

    const prio = document.getElementById("taskPriority")?.value || "medium";
    const cat = document.getElementById("taskCategory")?.value || "kisisel";
    const due = document.getElementById("taskDueDate")?.value || "";

    tasks.push({ id: Date.now(), text, done: false, priority: prio, category: cat, dueDate: due, subtasks: [] });
    input.value = "";
    input.focus();
    await saveTasks(tasks);
    renderTasks();
    renderDashboard();
    showToast("Görev eklendi.");
  }

  async function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    await saveTasks(tasks);
    
    const cardEl = document.getElementById(`task-${id}`);
    if (cardEl) {
      if (t.done) {
        cardEl.classList.add("done");
        const btn = cardEl.querySelector(".check-btn");
        if(btn) btn.style.animation = "popIn 0.3s ease";
        loadConfetti();
      } else {
        cardEl.classList.remove("done");
        const btn = cardEl.querySelector(".check-btn");
        if(btn) btn.style.animation = "none";
      }
    }
    
    renderDashboard();
    setTimeout(renderTasks, 400); // Wait for anim
  }

  async function deleteTask(id) {
    const check = await customConfirm("Görevi Sil", "Görevi silmek istediğinize emin misiniz?");
    if (!check) return;
    tasks = tasks.filter(t => t.id !== id);
    await saveTasks(tasks);
    renderTasks();
    renderDashboard();
    showToast("Görev silindi.");
  }

  async function moveTask(idx, dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= tasks.length) return;
    [tasks[idx], tasks[newIdx]] = [tasks[newIdx], tasks[idx]];
    await saveTasks(tasks);
    renderTasks();
  }

  window._addSubtask = async (taskId) => {
    const input = document.getElementById(`subtaskInput-${taskId}`);
    if(!input) return;
    const text = input.value.trim();
    if (!text) return;
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;

    if (!task.subtasks) task.subtasks = [];
    task.subtasks.push({ id: Date.now(), text, done: false });
    input.value = "";
    await saveTasks(tasks);
    renderTasks();
  };

  window._toggleSubtask = async (taskId, subId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const sub = task.subtasks.find(s => s.id === subId);
    if (!sub) return;
    sub.done = !sub.done;
    await saveTasks(tasks);
    renderTasks();
    if (sub.done) loadConfetti();
  };

  window._deleteSubtask = async (taskId, subId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    task.subtasks = task.subtasks.filter(s => s.id !== subId);
    await saveTasks(tasks);
    renderTasks();
  };

  let activeFilter = "all";
  window._filterTasks = (filter) => {
    activeFilter = filter;
    document.querySelectorAll(".filter-chip").forEach(c => {
      c.classList.toggle("active", c.dataset.filter === filter);
      c.setAttribute("aria-pressed", c.dataset.filter === filter);
    });
    renderTasks();
  };

  const taskSearchInput = document.getElementById("taskSearch");
  if(taskSearchInput) {
    taskSearchInput.addEventListener("input", () => renderTasks());
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    if(!list) return;
    const searchInput = document.getElementById("taskSearch");
    const searchVal = searchInput ? searchInput.value.toLowerCase() : "";
    
    const total = tasks.length;
    const completed = tasks.filter(t => t.done).length;
    const pct = total > 0 ? (completed / total) * 100 : 0;
    
    const fillEl = document.getElementById("taskProgressFill");
    if(fillEl) fillEl.style.width = `${pct}%`;
    const ratioEl = document.getElementById("taskProgressRatio");
    if(ratioEl) ratioEl.textContent = `${completed}/${total}`;

    let filtered = tasks;
    if (searchVal) filtered = filtered.filter(t => t.text.toLowerCase().includes(searchVal));
    if (activeFilter === "active") filtered = filtered.filter(t => !t.done);
    else if (activeFilter === "completed") filtered = filtered.filter(t => t.done);
    else if (activeFilter === "prio-high") filtered = filtered.filter(t => t.priority === "high");

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-state text-center p-y-4">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" style="margin:0 auto; opacity:0.8;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <p class="muted mt-3 text-sm font-bold">Listelenecek görev bulunamadı.</p>
        </div>
      `;
      return;
    }

    list.innerHTML = filtered.map((t, i) => {
      const prioColor = t.priority === "high" ? "#ef4444" : t.priority === "medium" ? "#f59e0b" : "#10b981";
      const catLabel = getCategoryLabel(t.category);
      const hasSubtasks = t.subtasks && t.subtasks.length > 0;
      const subCompleted = hasSubtasks ? t.subtasks.filter(s => s.done).length : 0;
      const subTotal = hasSubtasks ? t.subtasks.length : 0;

      return `
        <div class="task-card ${t.done ? "done" : ""}" draggable="true" data-idx="${i}" id="task-${t.id}">
          <div class="prio-strip" style="background-color: ${prioColor}"></div>
          <div class="task-main-row w-full flex items-center gap-4">
            <button class="check-btn" onclick="window._toggleTask(${t.id})" aria-label="${t.done ? 'Geri al' : 'Tamamla'}">
              ${t.done ? checkIcon() : emptyCheckIcon()}
            </button>
            <div class="task-content flex-1">
              <span class="task-text">${escHtml(t.text)}</span>
              <div class="flex flex-wrap gap-2 mt-2">
                <span class="badge" style="border:1px solid var(--border); color:var(--text-muted);">${catLabel}</span>
                ${t.dueDate ? `<span class="badge" style="border:1px solid var(--border); color:var(--text-muted);">📅 ${escHtml(t.dueDate)}</span>` : ""}
                ${hasSubtasks ? `<span class="badge" style="border:1px solid var(--border); color:var(--text-muted);">Alt: ${subCompleted}/${subTotal}</span>` : ""}
              </div>
            </div>
            <div class="task-actions flex gap-2">
              <button onclick="window._moveTask(${i}, -1)" class="icon-btn" aria-label="Yukarı taşı">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
              </button>
              <button onclick="window._moveTask(${i}, 1)" class="icon-btn" aria-label="Aşağı taşı">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
              </button>
              <button onclick="window._toggleSubtaskPanel(${t.id})" class="icon-btn" aria-label="Alt görevler">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
              </button>
              <button onclick="window._deleteTask(${t.id})" class="icon-btn del" aria-label="Görevi sil">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          <div id="subtaskPanel-${t.id}" class="subtask-panel hidden">
            <div class="subtask-list mt-3">
              ${(t.subtasks || []).map(s => `
                <div class="flex items-center gap-2 p-y-2 border-b">
                  <input type="checkbox" ${s.done ? "checked" : ""} onclick="window._toggleSubtask(${t.id}, ${s.id})" aria-label="Alt görevi tamamla" style="width:16px;" />
                  <span class="flex-1 text-sm ${s.done ? 'muted line-through' : ''}">${escHtml(s.text)}</span>
                  <button onclick="window._deleteSubtask(${t.id}, ${s.id})" class="icon-btn del text-xs" style="min-width:24px; min-height:24px; width:24px; height:24px;" aria-label="Sil">✕</button>
                </div>
              `).join("")}
            </div>
            <div class="flex gap-2 mt-2">
              <input type="text" id="subtaskInput-${t.id}" placeholder="Alt adım..." class="text-sm p-x-2 p-y-2" />
              <button class="btn-secondary text-sm p-x-2" onclick="window._addSubtask(${t.id})">Ekle</button>
            </div>
          </div>
        </div>
      `;
    }).join("");

    list.querySelectorAll(".task-card").forEach(el => {
      el.addEventListener("dragstart", e => { dragSrcIdx = +el.dataset.idx; e.dataTransfer.effectAllowed = "move"; });
      el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over"); });
      el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
      el.addEventListener("drop", async e => {
        e.preventDefault();
        el.classList.remove("drag-over");
        const targetIdx = +el.dataset.idx;
        if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
        const moved = tasks.splice(dragSrcIdx, 1)[0];
        tasks.splice(targetIdx, 0, moved);
        dragSrcIdx = null;
        await saveTasks(tasks);
        renderTasks();
      });
    });
  }

  window._toggleSubtaskPanel = (id) => { 
    const p = document.getElementById(`subtaskPanel-${id}`);
    if(p) p.classList.toggle("hidden"); 
  };
  function getCategoryLabel(cat) { const map = { is: "İş", kisisel: "Kişisel", saglik: "Sağlık", egitim: "Eğitim" }; return map[cat] || "Kişisel"; }
  window._toggleTask = (id) => toggleTask(id);
  window._deleteTask = (id) => deleteTask(id);

    document.querySelectorAll(".mood-btn").forEach(b => {

  async function loadReportForToday() {
    const dateEl = document.getElementById("reportDate");
    if (!dateEl) return;
    const today = dateEl.value;
    if (!today) return;

    const r = await loadReport(today);
    
    const howEl = document.getElementById("reportHow");
    if (howEl) howEl.value = r.how || "";
    
    const achievedEl = document.getElementById("reportAchieved");
    if (achievedEl) achievedEl.value = r.achieved || "";
    
    const hardEl = document.getElementById("reportHard");
    if (hardEl) hardEl.value = r.hard || "";

    if (energyEl) energyEl.value = energy;

  async function saveReport_() {
    const dateEl = document.getElementById("reportDate");
    if(!dateEl) return;
    const date = dateEl.value;
    const how = document.getElementById("reportHow")?.value || "";
    const achieved = document.getElementById("reportAchieved")?.value || "";
    const hard = document.getElementById("reportHard")?.value || "";
    const energy = parseInt(document.getElementById("reportEnergy")?.value || 3);
    
    await saveReport(date, { how, achieved, hard, mood: selectedMood, energy });

    if(listEl) listEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

    document.querySelectorAll(".j-mood-btn").forEach(b => {

  const journalInput = document.getElementById("journalInput");

    });

  function renderJournal() {
    const pinSection = document.getElementById("journalPinSection");
    const contentSection = document.getElementById("journalContent");
    if(!pinSection || !contentSection) return;
    if (journalLocked) {
      pinSection.classList.remove("hidden");
      contentSection.classList.add("hidden");
    } else {
      pinSection.classList.add("hidden");
      contentSection.classList.remove("hidden");
      loadAndRenderEntries();
    }
  }

  async function checkJournalPin() {
    const input = document.getElementById("journalPinInput");
    if(!input) return;
    const entered = input.value;
    const stored = profile.journalPin || "";
    const hashedEntered = await hashPin(entered);

    if (!stored) {
      if (entered.length < 4) { showToast("Güvenlik için en az 4 karakter gereklidir.", "warn"); return; }
      profile.journalPin = hashedEntered;
      await saveUserProfile({ journalPin: hashedEntered });
      input.value = "";
      journalLocked = false;
      renderJournal();
      showToast("Şifre oluşturuldu.");
    } else {
      if (hashedEntered === stored) {
        input.value = "";
        journalLocked = false;
        renderJournal();
      } else {
        input.classList.add("shake-anim");
        setTimeout(() => input.classList.remove("shake-anim"), 400);
        showToast("Hatalı şifre.", "error");
        input.value = "";
      }
    }
  }

    const list = document.getElementById("journalEntries");

    if (!entries.length) {
      list.innerHTML = `<p class="text-sm muted text-center p-y-4">Kayıtlı veri bulunmamaktadır.</p>`;
      return;

  function loadQuiz() {
    const wrap = document.getElementById("quizWrap");
    if(!wrap) return;
    const answeredCount = Object.keys(profile.quiz || {}).length;
    const progressPct = (answeredCount / quizQuestions.length) * 100;
    
    const fillEl = document.getElementById("quizProgressFill");
    if(fillEl) fillEl.style.width = `${progressPct}%`;
    const ratioEl = document.getElementById("quizProgressRatio");
    if(ratioEl) ratioEl.textContent = `${answeredCount}/${quizQuestions.length}`;

    wrap.innerHTML = quizQuestions.map(q => `

        <label class="block font-bold text-sm mb-3">${q.label}</label>
        <div class="flex flex-wrap gap-2">
          ${q.opts.map(opt => `
            <button class="btn-secondary text-sm ${profile.quiz?.[q.key] === opt ? "active bg-accent text-white" : ""}"
                    data-key="${q.key}" data-val="${opt}"
                    onclick="window._pickQuiz('${q.key}','${opt}',this)"
                    aria-pressed="${profile.quiz?.[q.key] === opt}">
              ${opt}

          `).join("")}

      b.setAttribute("aria-pressed", "false");

    btn.classList.add("active", "bg-accent", "text-white");
    btn.setAttribute("aria-pressed", "true");
    
    if (!profile.quiz) profile.quiz = {};
    profile.quiz[key] = val;

    const pct = (answeredCount / quizQuestions.length) * 100;

    const ratioEl = document.getElementById("quizProgressRatio");

  window._exportUserData = async () => {
    const dbEntries = await loadJournalEntries();
    const dbDumps = await loadBrainDumps();
    const backup = { profile, tasks, journals: dbEntries, brainDumps: dbDumps };
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup, null, 2));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", `dailyformind_export_${new Date().toISOString().split("T")[0]}.json`);
    dlAnchorElem.click();
    showToast("Veriler dışa aktarıldı.");
  };

  window._startBreathing = () => {
    if (breathInterval) { clearInterval(breathInterval); clearInterval(breathTotalTimer); }
    const type = document.getElementById("breathType")?.value || "box";
    breathTotalDuration = parseInt(document.getElementById("breathDuration")?.value || 1) * 60;
    
    const startBtn = document.getElementById("breathStartBtn");
    if(startBtn) startBtn.classList.add("hidden");
    const stopBtn = document.getElementById("breathStopBtn");
    if(stopBtn) stopBtn.classList.remove("hidden");

    breathState = 'in';
    breathCycleTime = 4;
    breathTimeLeft = breathCycleTime;
    updateBreathingAnimation();

    breathTotalTimer = setInterval(() => {
      breathTotalDuration--;
      const totalEl = document.getElementById("breathTimeTotalVal");
      if(totalEl) totalEl.textContent = `${Math.floor(breathTotalDuration / 60)}:${(breathTotalDuration % 60).toString().padStart(2,'0')}`;
      if (breathTotalDuration <= 0) {
        window._stopBreathing();
        showToast("Nefes egzersizi tamamlandı.");
        loadConfetti();
      }
    }, 1000);

    breathInterval = setInterval(() => {
      breathTimeLeft--;
      if (breathTimeLeft <= 0) {
        if (type === 'box') {
          if (breathState === 'in') { breathState = 'holdIn'; breathTimeLeft = 4; }
          else if (breathState === 'holdIn') { breathState = 'out'; breathTimeLeft = 4; }
          else if (breathState === 'out') { breathState = 'holdOut'; breathTimeLeft = 4; }
          else if (breathState === 'holdOut') { breathState = 'in'; breathTimeLeft = 4; }
        } else {
          if (breathState === 'in') { breathState = 'holdIn'; breathTimeLeft = 7; }
          else if (breathState === 'holdIn') { breathState = 'out'; breathTimeLeft = 8; }
          else if (breathState === 'out') { breathState = 'in'; breathTimeLeft = 4; }
        }
      }
      updateBreathingAnimation();
    }, 1000);
  };

  window._stopBreathing = () => {
    clearInterval(breathInterval);
    clearInterval(breathTotalTimer);
    breathInterval = null;
    breathTotalTimer = null;
    breathState = 'idle';
    
    const startBtn = document.getElementById("breathStartBtn");
    if(startBtn) startBtn.classList.remove("hidden");
    const stopBtn = document.getElementById("breathStopBtn");
    if(stopBtn) stopBtn.classList.add("hidden");
    
    const circle = document.getElementById("breathCircle");
    if(circle) circle.style.transform = "scale(1)";
    const statusText = document.getElementById("breathStatusText");
    if(statusText) statusText.textContent = "Derin Bir Nefes Al";
    const timeLeftText = document.getElementById("breathTimeLeftText");
    if(timeLeftText) timeLeftText.textContent = "Hazır Olunca Başlat";
  };

  function updateBreathingAnimation() {
    const circle = document.getElementById("breathCircle");
    const status = document.getElementById("breathStatusText");
    const timeLeft = document.getElementById("breathTimeLeftText");
    if(timeLeft) timeLeft.textContent = `${breathTimeLeft} Saniye`;

    if(!circle || !status) return;

    if (breathState === 'in') {
      circle.style.transform = "scale(1.6)";
      status.textContent = "Nefes Al";
      circle.style.backgroundColor = "rgba(var(--accent-rgb), 0.6)";
    } else if (breathState === 'holdIn') {
      circle.style.transform = "scale(1.6)";
      status.textContent = "Nefesini Tut";
      circle.style.backgroundColor = "rgba(245, 158, 11, 0.6)";
    } else if (breathState === 'out') {
      circle.style.transform = "scale(1)";
      status.textContent = "Nefes Ver";
      circle.style.backgroundColor = "rgba(16, 185, 129, 0.6)";
    } else if (breathState === 'holdOut') {
      circle.style.transform = "scale(1)";
      status.textContent = "Boşta Tut";
      circle.style.backgroundColor = "rgba(100, 116, 139, 0.6)";
    }
  }

  function toggleBrainDump() {
    const panel = document.getElementById("brainDumpPanel");
    if(!panel) return;
    panel.classList.toggle("hidden");
    if (!panel.classList.contains("hidden")) {
      renderBrainDumps();
      const textEl = document.getElementById("brainDumpText");
      if(textEl) textEl.focus();
    }
  }

  async function sendBrainDump() {
    const ta = document.getElementById("brainDumpText");
    if(!ta) return;
    const text = ta.value.trim();
    if (!text) return;
    await saveBrainDump(text);
    ta.value = "";
    renderBrainDumps();
    showToast("Not kaydedildi.");
  }

  window._dumpToTask = async (id, text) => {
    tasks.push({ id: Date.now(), text, done: false, priority: "medium", category: "kisisel", subtasks: [] });
    await saveTasks(tasks);
    await deleteBrainDump(id);
    renderBrainDumps();
    renderTasks();
    renderDashboard();
    showToast("Not göreve dönüştürüldü.");
  };

  async function renderBrainDumps() {
    const notes = await loadBrainDumps();
    const list = document.getElementById("brainDumpList");
    if(!list) return;
    if (!notes.length) {
      list.innerHTML = `<p class="text-xs muted py-2 text-center font-bold">Kayıtlı not bulunmamaktadır.</p>`;
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="card p-x-3 p-y-3" style="padding:0.8rem; margin-bottom:0.5rem; display:flex; flex-direction:column; gap:0.5rem;">
        <span class="text-sm font-medium" style="line-height:1.4;">${escHtml(n.text)}</span>
        <div class="flex gap-2 justify-end">
          <button onclick="window._dumpToTask('${n.id}', '${escHtml(n.text).replace(/'/g, "\\'")}')" class="btn-secondary text-xs p-x-2 p-y-1">Göreve Çevir</button>
          <button onclick="window._deleteDump('${n.id}')" class="btn-secondary text-xs p-x-2 p-y-1" style="color:#ef4444; border-color:#ef4444;">Sil</button>
        </div>
      </div>
    `).join("");
  }

  window._deleteDump = async (id) => { 
    const check = await customConfirm("Onay", "Not kalıcı olarak silinecektir.");
    if(!check) return;
    await deleteBrainDump(id); 
    renderBrainDumps(); 
    showToast("Not silindi."); 
  };

  function applyTheme(theme) { 
    document.documentElement.classList.toggle("dark", theme === "dark"); 
    profile.theme = theme; 
  }

  const accentMap = {
    indigo: { light: "#4f46e5", dark: "#6366f1", bg: "rgba(79, 70, 229, 0.1)", rgb: "79, 70, 229", grad: "linear-gradient(135deg, #4f46e5 0%, #3730a3 100%)" },
    violet: { light: "#7c3aed", dark: "#8b5cf6", bg: "rgba(124, 58, 237, 0.1)", rgb: "124, 58, 237", grad: "linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%)" },
    rose:   { light: "#e11d48", dark: "#f43f5e", bg: "rgba(225, 29, 72, 0.1)", rgb: "225, 29, 72", grad: "linear-gradient(135deg, #e11d48 0%, #9f1239 100%)" },
    teal:   { light: "#0d9488", dark: "#14b8a6", bg: "rgba(13, 148, 136, 0.1)", rgb: "13, 148, 136", grad: "linear-gradient(135deg, #0d9488 0%, #0f766e 100%)" },
    amber:  { light: "#d97706", dark: "#f59e0b", bg: "rgba(217, 119, 6, 0.1)", rgb: "217, 119, 6", grad: "linear-gradient(135deg, #d97706 0%, #b45309 100%)" },
  };

  function applyAccent(key) {
    const a = accentMap[key] || accentMap.indigo;
    const r = document.documentElement.style;
    r.setProperty("--accent", a.light);
    r.setProperty("--accent-dark", a.dark);
    r.setProperty("--accent-bg", a.bg);
    r.setProperty("--accent-rgb", a.rgb);
    r.setProperty("--accent-grad", a.grad);
    profile.accent = key;
  }

  function customConfirm(title, message) {
    return new Promise((resolve) => {
      const modal = document.getElementById("confirmModal");
      document.getElementById("confirmTitle").textContent = title;
      document.getElementById("confirmMessage").textContent = message;

      const oldApprove = document.getElementById("confirmApproveBtn");
      const oldCancel = document.getElementById("confirmCancelBtn");

      const approveBtn = oldApprove.cloneNode(true);
      const cancelBtn = oldCancel.cloneNode(true);
      oldApprove.replaceWith(approveBtn);
      oldCancel.replaceWith(cancelBtn);

      modal.classList.remove("hidden");
      
      const first = document.getElementById("confirmCancelBtn");
      const last = document.getElementById("confirmApproveBtn");
      
      const keyHandler = (e) => {
        if (e.key === 'Escape') { cleanup(false); }
        if (e.key === 'Tab') {
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      };
      
      modal.addEventListener('keydown', keyHandler);
      first.focus();

      let isResolved = false;
      const cleanup = (result) => {
        if (isResolved) return;
        isResolved = true;
        modal.classList.add("hidden");
        modal.removeEventListener('keydown', keyHandler);
        resolve(result);
      };

      approveBtn.addEventListener("click", () => cleanup(true));
      cancelBtn.addEventListener("click", () => cleanup(false));
    });
  }

  function escHtml(str) { return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function fmtDate(d) { return d.toLocaleString("tr-TR", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" }); }
  function checkIcon() { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }
  function emptyCheckIcon() { return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4"/></svg>`; }
  function firebaseErrorMsg(code) {
    const m = { "auth/email-already-in-use":"Bu e-posta adresi kayıtlı.", "auth/invalid-email":"Geçersiz format.", "auth/wrong-password":"Hatalı şifre.", "auth/user-not-found":"Hesap bulunamadı.", "auth/weak-password":"En az 6 karakter gerekli." };
    return m[code] || "Sistem hatası: " + code;
  }
  
  function showToast(msg, type="ok") {
    const t = document.getElementById("toast");
    if(!t) return;
    t.innerHTML = `<div class="flex items-center gap-2"><span>${type === 'ok' ? '✓' : '⚠️'}</span><span class="font-bold">${msg}</span></div>`;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  async function loadConfetti() {
    if (!window.confetti) {
      const script = document.createElement('script');
      script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js";
      script.onload = () => window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
      document.head.appendChild(script);
    } else {
      window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }
  }
